<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../../_ds/utg-design-system-62bf007e-1ea9-45bc-a40a-f64544314e8c/tokens/fonts.css">
  <link rel="stylesheet" href="../../_ds/utg-design-system-62bf007e-1ea9-45bc-a40a-f64544314e8c/tokens/colors.css">
  <link rel="stylesheet" href="../../_ds/utg-design-system-62bf007e-1ea9-45bc-a40a-f64544314e8c/tokens/typography.css">
  <link rel="stylesheet" href="../../_ds/utg-design-system-62bf007e-1ea9-45bc-a40a-f64544314e8c/tokens/spacing.css">
  <link rel="stylesheet" href="../../_ds/utg-design-system-62bf007e-1ea9-45bc-a40a-f64544314e8c/tokens/base.css">
  <link rel="stylesheet" href="../../_ds/utg-design-system-62bf007e-1ea9-45bc-a40a-f64544314e8c/tokens/components.css">
  <link rel="stylesheet" href="../../_ds/utg-design-system-62bf007e-1ea9-45bc-a40a-f64544314e8c/styles.css">
  <script src="../../_ds/utg-design-system-62bf007e-1ea9-45bc-a40a-f64544314e8c/_ds_bundle.js"></script>
  <style>header a img{height:38px !important}</style>
</helmet>
<div id="home" style="min-height:100vh;display:flex;flex-direction:column;background:var(--paper)">
  <x-import component-from-global-scope="UTGDesignSystem_62bf00.Header" locale="{{ locale }}" on-locale-change="{{ setLocale }}" logo-src="../../assets/logo-640.png" sticky="{{ sticky }}" cart-count="{{ cartCount }}" hint-size="100%,64px"></x-import>
  <main style="flex:1 1 auto">
    <section data-screen-label="Hero" style="padding:clamp(var(--space-7),7vw,var(--space-9)) var(--gutter) var(--space-7)">
      <div style="max-width:var(--container);margin:0 auto">
        <div style="position:relative">
          <h1 style="font:var(--type-hero);letter-spacing:var(--display-tracking)">Ukrainian<br>Tactical<br>Gear</h1>
          <sc-if value="{{ showSkull }}" hint-placeholder-val="{{ true }}">
            <img src="../../assets/logo-640.png" alt="UTG" style="position:absolute;right:0;bottom:4px;width:clamp(120px,26vw,300px);height:auto">
          </sc-if>
          <sc-if value="{{ showPhoto }}" hint-placeholder-val="{{ false }}">{{ heroPhotoImg }}</sc-if>
        </div>
        <hr class="utg-rule utg-rule--heavy" style="margin:var(--space-5) 0 0">
        <div style="padding-top:var(--space-5);display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:var(--space-5) var(--space-7)">
          <div style="flex:1 1 300px">
            <div style="font:var(--type-caption);letter-spacing:var(--caps-tracking);text-transform:uppercase;color:var(--ink);margin-bottom:var(--space-2)">{{ t.stamp }}</div>
            <p style="font:var(--type-body);color:var(--ink-soft);max-width:46ch;text-wrap:pretty">{{ t.mission }}</p>
          </div>
          <div style="flex:0 0 auto;display:flex;align-items:center;flex-wrap:wrap;gap:var(--space-4) var(--space-5)">
            <x-import component-from-global-scope="UTGDesignSystem_62bf00.Button" variant="accent" href="#merch" hint-size="220px,48px">{{ t.cta }}<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg></x-import>
            <a href="https://www.instagram.com/ukrainian_tactical_gear/" target="_blank" rel="noreferrer" style="display:inline-flex;align-items:center;gap:8px;min-height:48px;font:500 0.8125rem var(--font-mono);letter-spacing:var(--caps-tracking);text-transform:uppercase"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><path d="M17.5 6.5h.01"></path></svg>Instagram</a>
          </div>
        </div>
      </div>
    </section>
    <section id="merch" class="utg-band" data-screen-label="Merch band">
      <div style="max-width:var(--container);margin:0 auto;display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:var(--space-4)">
        <h2>{{ t.merchTitle }}</h2>
        <span style="font:var(--type-caption);letter-spacing:var(--caps-tracking);text-transform:uppercase;color:var(--band-muted)">{{ t.merchMeta }}</span>
      </div>
    </section>
    <section data-screen-label="Categories" style="padding:var(--space-6) var(--gutter) var(--space-9)">
      <div style="max-width:var(--container);margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,240px),1fr));gap:var(--space-5)">
        <a class="utg-card" href="#/category/patches">
          <span class="utg-card-media"><img src="../../assets/products/patch-utg.jpg" alt="{{ t.catPatches }}"></span>
          <span style="display:flex;align-items:center;gap:var(--space-3);padding:14px 16px">
            <span style="font:var(--type-caption);letter-spacing:var(--caps-tracking);color:var(--ink-faint)">01</span>
            <span style="flex:1 1 auto;font:500 var(--text-h3)/1 var(--font-display);letter-spacing:var(--display-tracking);text-transform:uppercase">{{ t.catPatches }}</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
          </span>
        </a>
        <a class="utg-card" href="#/category/stickers">
          <span class="utg-card-media"><img src="../../assets/products/stickers-2.jpg" alt="{{ t.catStickers }}"></span>
          <span style="display:flex;align-items:center;gap:var(--space-3);padding:14px 16px">
            <span style="font:var(--type-caption);letter-spacing:var(--caps-tracking);color:var(--ink-faint)">02</span>
            <span style="flex:1 1 auto;font:500 var(--text-h3)/1 var(--font-display);letter-spacing:var(--display-tracking);text-transform:uppercase">{{ t.catStickers }}</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
          </span>
        </a>
        <a class="utg-card" href="#/category/tshirts">
          <span class="utg-card-media"><img src="../../assets/products/tshirt-death-black.jpg" alt="{{ t.catTshirts }}"></span>
          <span style="display:flex;align-items:center;gap:var(--space-3);padding:14px 16px">
            <span style="font:var(--type-caption);letter-spacing:var(--caps-tracking);color:var(--ink-faint)">03</span>
            <span style="flex:1 1 auto;font:500 var(--text-h3)/1 var(--font-display);letter-spacing:var(--display-tracking);text-transform:uppercase">{{ t.catTshirts }}</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
          </span>
        </a>
      </div>
    </section>
  </main>
  <x-import component-from-global-scope="UTGDesignSystem_62bf00.Footer" locale="{{ locale }}" hint-size="100%,280px"></x-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;locale&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;uk&quot;, &quot;en&quot;], &quot;default&quot;: &quot;uk&quot;, &quot;tsType&quot;: &quot;\&quot;uk\&quot; | \&quot;en\&quot;&quot;, &quot;section&quot;: &quot;Content&quot;},
  &quot;heroPhotoSrc&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Hero&quot;},
  &quot;stickyHeader&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Chrome&quot;}
}">
class Component extends DCLogic {
  state = { locale: null };
  renderVals() {
    const locale = this.state.locale ?? this.props.locale ?? "uk";
    const heroPhoto = (this.props.heroPhotoSrc ?? "").trim();
    const T = {
      uk: {
        stamp: "Волонтерський проект",
        mission: "Усі кошти з продажу мерчу йдуть на спорядження для підшефного спецпідрозділу.",
        cta: "Замовити мерч",
        merchTitle: "мерч",
        merchMeta: "3 категорії",
        catPatches: "Патчі",
        catStickers: "Стікери",
        catTshirts: "Футболки",
      },
      en: {
        stamp: "Volunteer project",
        mission: "All merch proceeds buy equipment for a Ukrainian special-forces unit.",
        cta: "Get Merch",
        merchTitle: "merch",
        merchMeta: "3 categories",
        catPatches: "Patches",
        catStickers: "Stickers",
        catTshirts: "T-Shirts",
      },
    };
    return {
      locale,
      t: T[locale],
      setLocale: (l) => this.setState({ locale: l }),
      heroPhotoImg: heroPhoto
        ? React.createElement("img", {
            src: heroPhoto,
            alt: "",
            style: { position: "absolute", right: 0, bottom: "4px", width: "clamp(150px,30vw,320px)", aspectRatio: "1/1", objectFit: "cover", border: "2px solid var(--ink)", background: "var(--white)" },
          })
        : null,
      showPhoto: !!heroPhoto,
      showSkull: !heroPhoto,
      sticky: this.props.stickyHeader ?? true,
      cartCount: 0,
    };
  }
}
</script>
</body>
</html>
